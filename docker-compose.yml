version: '3.9'

services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - vision-data:/app/data
    networks: [vision]

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE: http://backend:8000
      NEXT_PUBLIC_SSE_BASE: http://backend:8000
      NEXT_PUBLIC_WS_BASE: ws://backend:8000
    ports:
      - "5000:5000"
    depends_on: [backend]
    networks: [vision]

networks:
  vision: {}

volumes:
  vision-data: {}
